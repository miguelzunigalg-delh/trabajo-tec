<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa Punta de Lobos PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>

<style>
body { margin:0; font-family:'Poppins', sans-serif; }

#map { height:100vh; }

/* PANEL */
.panel {
    position:absolute;
    top:10px;
    left:10px;
    background:white;
    padding:10px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    z-index:1000;
}

.btn {
    display:block;
    margin:5px 0;
    padding:6px;
    border:none;
    border-radius:8px;
    background:#00c853;
    color:white;
    font-size:0.8rem;
    cursor:pointer;
}

.rating {
    color: gold;
}
</style>
</head>

<body>

<div class="panel">
    <button class="btn" onclick="toggleLayer('main')">🌊 Punto</button>
    <button class="btn" onclick="toggleLayer('hotel')">🏨 Hoteles</button>
    <button class="btn" onclick="toggleLayer('food')">🍽️ Comida</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<script>

// Coordenadas principal
const mainLat = -34.428138;
const mainLon = -72.041360;

// Crear mapa
const map = L.map('map').setView([mainLat, mainLon], 14);

// Capa base
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// Capas
const layers = {
    main: L.layerGroup().addTo(map),
    hotel: L.layerGroup().addTo(map),
    food: L.layerGroup().addTo(map)
};

// ICONOS
const iconMain = L.icon({ iconUrl:'https://cdn-icons-png.flaticon.com/512/684/684908.png', iconSize:[30,30]});
const iconHotel = L.icon({ iconUrl:'https://cdn-icons-png.flaticon.com/512/139/139899.png', iconSize:[30,30]});
const iconFood = L.icon({ iconUrl:'https://cdn-icons-png.flaticon.com/512/3075/3075977.png', iconSize:[30,30]});
const iconUser = L.icon({ iconUrl:'https://cdn-icons-png.flaticon.com/512/149/149071.png', iconSize:[30,30]});

// VARIABLES
let userMarker = null;
let routingControl = null;

// 📍 UBICACIÓN EN TIEMPO REAL
navigator.geolocation.watchPosition(pos => {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    if (userMarker) {
        userMarker.setLatLng([lat, lon]);
    } else {
        userMarker = L.marker([lat, lon], {icon: iconUser}).addTo(map)
        .bindPopup("Tu ubicación 📍");
    }
});

// 🧭 RUTA DIBUJADA
function dibujarRuta(lat, lon) {

    if (!userMarker) {
        alert("Activa ubicación primero");
        return;
    }

    if (routingControl) {
        map.removeControl(routingControl);
    }

    routingControl = L.Routing.control({
        waypoints: [
            userMarker.getLatLng(),
            L.latLng(lat, lon)
        ],
        routeWhileDragging: false
    }).addTo(map);
}

// 📍 PIN PRINCIPAL
L.marker([mainLat, mainLon], {icon: iconMain})
.addTo(layers.main)
.bindPopup(`
<b>Punto principal 🌊</b><br>
<div class="rating">★★★★★ (5.0)</div>
<button onclick="dibujarRuta(${mainLat}, ${mainLon})">Cómo llegar</button>
`);

// 🏨 HOTEL
L.marker([-34.4128, -72.0220], {icon: iconHotel})
.addTo(layers.hotel)
.bindPopup(`
<b>Hotel Alaia 🏨</b><br>
<div class="rating">★★★★★ (4.7)</div>
<button onclick="dibujarRuta(-34.4128, -72.0220)">Cómo llegar</button>
`);

// 🍽️ RESTAURANTES
L.marker([-34.3925, -72.0065], {icon: iconFood})
.addTo(layers.food)
.bindPopup(`
<b>La Loba 🍽️</b><br>
<div class="rating">★★★★☆ (4.6)</div>
<button onclick="dibujarRuta(-34.3925, -72.0065)">Cómo llegar</button>
`);

L.marker([-34.3865, -72.0050], {icon: iconFood})
.addTo(layers.food)
.bindPopup(`
<b>Cardumen Café ☕</b><br>
<div class="rating">★★★★☆ (4.4)</div>
<button onclick="dibujarRuta(-34.3865, -72.0050)">Cómo llegar</button>
`);

// 🎛️ FILTROS
function toggleLayer(type) {
    if (map.hasLayer(layers[type])) {
        map.removeLayer(layers[type]);
    } else {
        map.addLayer(layers[type]);
    }
}

</script>

</body>
</html>
