<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Punta de Lobos | App Turística</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #f1faee;
}

/* HERO */
.hero {
    height: 60vh;
    background: url('punta-lobos.jpg') center/cover no-repeat;
    display: flex;
    align-items: flex-end;
    padding: 20px;
    color: white;
}

/* CONTENIDO */
.container { padding: 20px; }

.card {
    background: white;
    border-radius: 15px;
    margin-bottom: 15px;
    overflow: hidden;
    box-shadow: 0 8px 15px rgba(0,0,0,0.1);
}

/* IMAGENES */
.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

/* TEXTO */
.card-content {
    padding: 15px;
}

.rating { color: gold; }

/* BOTONES */
.btn {
    display: inline-block;
    padding: 10px;
    background: #00c853;
    color: white;
    border-radius: 10px;
    margin-top: 10px;
    border: none;
    cursor: pointer;
    transition: 0.2s;
}

.btn:hover {
    transform: scale(1.05);
}

/* FAVORITOS */
.fav {
    float: right;
    cursor: pointer;
    font-size: 20px;
}

/* NAVBAR */
.navbar {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: white;
    display: flex;
    justify-content: space-around;
    padding: 10px;
    box-shadow: 0 -5px 10px rgba(0,0,0,0.1);
}

/* MAPA */
#map {
    height: 300px;
    border-radius: 15px;
}
</style>
</head>

<body>

<div class="hero">
    <h1>Punta de Lobos 🌊</h1>
</div>

<div class="container">

<h2>🏄 Actividades</h2>
<div class="card"><div class="card-content">Surf, caminatas, fotografía</div></div>

<h2>⭐ Lugares</h2>

<!-- HOTEL -->
<div class="card">
<img src="hotel.jpg">
<div class="card-content">
<b>Hotel Alaia 🏨</b>
<span class="fav" onclick="fav(this)">🤍</span>
<div class="rating">★★★★★ (4.7)</div>
<button class="btn" onclick="ir(-34.4128,-72.0220)">Ir</button>
</div>
</div>

<!-- RESTAURANTE -->
<div class="card">
<img src="loba.jpg">
<div class="card-content">
<b>La Loba 🍽️</b>
<span class="fav" onclick="fav(this)">🤍</span>
<div class="rating">★★★★☆ (4.6)</div>
<button class="btn" onclick="ir(-34.3925,-72.0065)">Ir</button>
</div>
</div>

<!-- CAFE -->
<div class="card">
<img src="cafe.jpg">
<div class="card-content">
<b>Cardumen Café ☕</b>
<span class="fav" onclick="fav(this)">🤍</span>
<div class="rating">★★★★☆ (4.4)</div>
<button class="btn" onclick="ir(-34.3865,-72.0050)">Ir</button>
</div>
</div>

<h2>🗺️ Mapa</h2>
<div id="map"></div>

</div>

<div class="navbar">
<div>🏠</div>
<div>❤️</div>
<div>🗺️</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<script>

// MAPA
const map = L.map('map').setView([-34.428138, -72.041360], 14);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let userMarker, route;

// UBICACION
navigator.geolocation.watchPosition(pos => {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    if(userMarker){
        userMarker.setLatLng([lat, lon]);
    } else {
        userMarker = L.marker([lat, lon]).addTo(map);
    }
});

// RUTA
function ir(lat, lon){
    if(!userMarker){ alert("Activa ubicación"); return; }

    if(route){ map.removeControl(route); }

    route = L.Routing.control({
        waypoints: [userMarker.getLatLng(), L.latLng(lat, lon)]
    }).addTo(map);
}

// FAVORITOS
function fav(el){
    if(el.innerHTML === "🤍"){
        el.innerHTML = "❤️";
    } else {
        el.innerHTML = "🤍";
    }
}

</script>

</body>
</html>
